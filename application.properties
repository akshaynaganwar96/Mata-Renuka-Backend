# ============================================
# Renuka Mata Tour & Travels — Spring Boot Config
# ============================================

server.port=${PORT:8080}

# --- MySQL Database ---
# Railway pe deploy karte waqt yeh values automatically environment variables se aayengi.
# Local pe chalane ke liye default values use hongi.
spring.datasource.url=${MYSQLURL:jdbc:mysql://localhost:3306/renukamata_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:yourpassword}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# --- Jackson ---
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata

# --- Logging ---
logging.level.com.renukamata=DEBUG
